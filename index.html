<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosquito Slayer | Official Game</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f12; color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }
        .container { text-align: center; width: 90%; max-width: 400px; margin-top: 50px; }
        .logo-box {
            width: 150px; height: 150px; background: #1e1e26;
            margin: 0 auto 20px; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.2); border: 2px solid #333;
        }
        h1 { margin: 10px 0; font-size: 2rem; color: #00ff7f; text-transform: uppercase; }
        .trust-badge {
            display: inline-block; background: rgba(0, 255, 127, 0.1);
            color: #00ff7f; padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: bold; margin-bottom: 20px; border: 1px solid #00ff7f;
        }
        .install-btn {
            display: block; background: linear-gradient(45deg, #00ff7f, #008f47);
            color: #000; padding: 18px; text-decoration: none;
            font-size: 20px; font-weight: bold; border-radius: 12px;
            margin: 20px 0; transition: transform 0.2s;
        }
        .install-btn:hover { transform: scale(1.05); }
        .section-title { color: #fff; margin: 30px 0 15px; font-size: 1.2rem; }
        
        .screenshot-container {
            display: flex; gap: 10px; overflow-x: auto;
            padding-bottom: 10px; scrollbar-width: none;
        }
        .screenshot-container::-webkit-scrollbar { display: none; }
        .screenshot-card {
            min-width: 90px; height: 170px; background: #1e1e26;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; border: 1px solid #333;
            cursor: pointer; transition: 0.3s; overflow: hidden;
        }
        .screenshot-card img { width: 100%; height: 100%; object-fit: cover; }
        .screenshot-card:hover { border-color: #00ff7f; }
        
        /* Lightbox (Blur Effect) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 15px; border: 2px solid #fff; }
        
        .social-box { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
        .social-link {
            color: #aaa; text-decoration: none; font-size: 14px;
            padding: 12px; border: 1px solid #333; border-radius: 8px;
        }

        /* New Footer Style */
        .footer-note {
            color: #888;
            font-size: 12px;
            margin-top: 40px;
            line-height: 1.5;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">LOGO</div>
        <h1>Mosquito Slayer</h1>
        <div class="trust-badge">100% Trusted App • Safe & Secure</div>
        <a href="Mosquito%20Slayer.apk" class="install-btn">Download Now</a>
        <h3 class="section-title">Screenshots & Proofs</h3>
        <div class="screenshot-container">
            <div class="screenshot-card" onclick="openLightbox('https://iili.io/CA0uttt.md.png')">
                <img src="https://iili.io/CA0uttt.md.png" alt="Proof">
            </div>
            <div class="screenshot-card" onclick="openLightbox('screenshot2.jpg')">Img 2</div>
            <div class="screenshot-card" onclick="openLightbox('screenshot3.jpg')">Img 3</div>
            <div class="screenshot-card" onclick="openLightbox('screenshot4.jpg')">Img 4</div>
        </div>
        <div class="social-box">
            <a href="#" class="social-link">YouTube Channel</a>
            <a href="#" class="social-link">Join Telegram for Updates</a>
        </div>

        <div class="footer-note">
            This is the official website of Mosquito Slayer. Download the latest official version of the application only from this website.
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full Screenshot">
    </div>
    <script>
        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
