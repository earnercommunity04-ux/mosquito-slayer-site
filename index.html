<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosquito Slayer | Official Game</title>
    <style>
        /* Blue tap highlight हटा दिया गया है */
        * { -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f12; color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }
        .container { text-align: center; width: 90%; max-width: 400px; margin-top: 50px; }
        
        .logo-box {
            width: 150px; height: 150px; background: #1e1e26;
            margin: 0 auto 20px; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.2); border: 2px solid #333;
            overflow: hidden;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { margin: 10px 0; font-size: 2rem; color: #00ff7f; text-transform: uppercase; }
        .trust-badge {
            display: inline-block; background: rgba(0, 255, 127, 0.1);
            color: #00ff7f; padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: bold; margin-bottom: 20px; border: 1px solid #00ff7f;
        }
        .install-btn {
            display: block; background: linear-gradient(45deg, #00ff7f, #008f47);
            color: #000; padding: 18px; text-decoration: none;
            font-size: 20px; font-weight: bold; border-radius: 12px;
            margin: 20px 0; transition: transform 0.2s;
        }
        .install-btn:hover { transform: scale(1.05); }
        
        .section-title { color: #fff; margin: 30px 0 15px; font-size: 1.2rem; }
        
        /* Slider Styles */
        .slider-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .screenshot-container {
            display: flex; gap: 10px; overflow-x: auto;
            padding-bottom: 10px; scrollbar-width: none; scroll-behavior: smooth;
            width: 100%;
        }
        .screenshot-container::-webkit-scrollbar { display: none; }
        .screenshot-card {
            min-width: 120px; height: 200px; background: #1e1e26;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; border: 1px solid #333;
            cursor: pointer; transition: 0.3s; overflow: hidden;
        }
        .screenshot-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-btn {
            background: rgba(255,255,255,0.2); color: white;
            border: none; padding: 10px; border-radius: 50%;
            cursor: pointer; position: absolute; z-index: 10;
        }
        .prev-btn { left: -15px; }
        .next-btn { right: -15px; }

        /* Lightbox (Slideshow) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; z-index: 1000;
        }
        #lightbox img { max-width: 85%; max-height: 70%; border-radius: 15px; }
        
        .lb-nav {
            position: absolute; color: white; font-size: 30px;
            cursor: pointer; padding: 20px; background: rgba(255,255,255,0.1);
            border-radius: 50%; user-select: none;
        }
        .lb-prev { left: 20px; }
        .lb-next { right: 20px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: white; }

        .social-box { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
        .social-link {
            color: #aaa; text-decoration: none; font-size: 14px;
            padding: 12px; border: 1px solid #333; border-radius: 8px;
        }
        .footer-note {
            color: #888; font-size: 12px; margin-top: 40px;
            line-height: 1.5; padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="https://iili.io/CEriUzu.md.png" alt="App Logo">
        </div>
        <h1>Mosquito Slayer</h1>
        <div class="trust-badge">100% Trusted App • Safe & Secure</div>
        <a href="Mosquito%20Slayer.apk" class="install-btn">Download Now</a>
        <h3 class="section-title">Screenshots & Proofs</h3>
        
        <div class="slider-wrapper">
            <button class="nav-btn prev-btn" onclick="scrollSlider(-200)">&#10094;</button>
            <div class="screenshot-container" id="slider">
                <div class="screenshot-card" onclick="openLightbox(0)">
                    <img src="https://iili.io/CEr8oq7.md.jpg" alt="Proof 1">
                </div>
                <div class="screenshot-card" onclick="openLightbox(1)">
                    <img src="https://iili.io/CEEruWP.md.jpg" alt="Proof 2">
                </div>
                <div class="screenshot-card" onclick="openLightbox(2)">
                    <img src="https://iili.io/CEEUs6u.md.jpg" alt="Proof 3">
                </div>
                <div class="screenshot-card" onclick="openLightbox(3)">
                    <img src="https://iili.io/CEreM7f.md.png" alt="Proof 4">
                </div>
            </div>
            <button class="nav-btn next-btn" onclick="scrollSlider(200)">&#10095;</button>
        </div>

        <div class="social-box">
            <a href="#" class="social-link">YouTube Channel</a>
            <a href="#" class="social-link">Join Telegram for Updates</a>
        </div>

        <div class="footer-note">
            This is the official website of Mosquito Slayer. Download the latest official version of the application only from this website.
        </div>
    </div>

    <!-- Lightbox with Slide -->
    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <div class="lb-nav lb-prev" onclick="changeSlide(-1)">&#10094;</div>
        <img id="lightbox-img" src="" alt="Full Screenshot">
        <div class="lb-nav lb-next" onclick="changeSlide(1)">&#10095;</div>
    </div>

    <script>
        const images = [
            'https://iili.io/CEr8oq7.md.jpg',
            'https://iili.io/CEEruWP.md.jpg',
            'https://iili.io/CEEUs6u.md.jpg',
            'https://iili.io/CEreM7f.md.png'
        ];
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox-img').src = images[currentIndex];
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
        function changeSlide(direction) {
            currentIndex = (currentIndex + direction + images.length) % images.length;
            document.getElementById('lightbox-img').src = images[currentIndex];
        }
        function scrollSlider(amount) {
            document.getElementById('slider').scrollBy({ left: amount, behavior: 'smooth' });
        }
    </script>
</body>
</html>
